name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run tests
        run: cargo test --locked

      - name: Run Soli tests
        run: cargo run --locked -- test

  # Keeps the Windows port from silently re-breaking. The crate has no
  # structural pressure to stay portable, so without a gate the next
  # unconditional `nix` import or `/`-joined path lands unnoticed and is far
  # more expensive to find later. Checks only — running the tests needs a
  # Windows runner, which the release matrix already provides.
  windows-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check --locked --all-targets

      # Runs the unit tests, which is where the Windows-specific code lives:
      # LockFileEx single-instance locking, job objects, and owner-only
      # directory creation. Those were written and compile-verified from Linux
      # and have never executed — this is the only place they can.
      #
      # Scoped to --lib deliberately. The integration suites shell out, assume
      # POSIX paths and spawn a database; making them portable is its own piece
      # of work, and a red job nobody can act on is worse than a narrow green
      # one that actually gates something.
      - name: Unit tests
        run: cargo test --locked --lib

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Restore cargo cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  # Drives Soli's own frontend in a real headless browser: instant-nav, the
  # LiveView client, and the dev bar. None of it was covered before — jsdom
  # cannot open a websocket or lay anything out, so a morph, an event dispatch
  # or a head merge could break silently.
  #
  # A standalone job rather than a step on `test`: it needs a browser nobody
  # else needs, and running in parallel keeps it off the critical path.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # The runner image happens to ship Chrome, but relying on that makes the
      # job depend on an image detail that can change without notice.
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Build
        run: cargo build --locked

      # The driver itself, against a browser but no server.
      - name: Test the browser driver
        run: cargo test --locked --test browser_driver_test

      # The framework's frontend, against a real Soli server.
      - name: Run browser specs
        run: cargo run --locked -- test tests-e2e/browser/specs --browser --no-coverage

  # Validate that the tagged + PDF/A output is genuinely conformant, using the
  # veraPDF reference validator. Guards the "accessible + archival" claim: the
  # sample must pass BOTH PDF/A-3b and PDF/UA-1 (veraPDF exits non-zero on a
  # non-compliant file, failing the job).
  verapdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java (for veraPDF)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install veraPDF
        run: |
          curl -fsSL -o /tmp/vera.zip https://software.verapdf.org/rel/verapdf-installer.zip
          (cd /tmp && unzip -q vera.zip)
          JAR=$(ls /tmp/verapdf-greenfield-*/verapdf-izpack-installer-*.jar | head -1)
          java -jar "$JAR" scripts/verapdf-auto-install.xml

      - name: Restore cargo cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Generate sample PDFs
        run: cargo run --locked -- scripts/verapdf_samples.sl

      - name: Validate PDF/A-3b
        run: /tmp/verapdf/verapdf --flavour 3b /tmp/vp_tagged_pdfa.pdf

      - name: Validate PDF/UA-1
        run: /tmp/verapdf/verapdf --flavour ua1 /tmp/vp_tagged_pdfa.pdf

  # SEC-094: scan Cargo.lock for known RustSec advisories on every push
  # and PR. Default policy: cargo audit exits non-zero on a confirmed
  # vulnerability, making CI fail; informational notices (unmaintained /
  # unsound dependency tree) surface as warnings without blocking.
  #
  # Waiving a finding: prefer fixing the upstream version. If a wait is
  # justified (no fix available, transitive-only, etc.), commit a
  # `.cargo/audit.toml` with an `[advisories] ignore = ["RUSTSEC-..."]`
  # entry and a comment explaining why and when to revisit.
  #
  # Not gated on by `release` on purpose — fresh advisories can land at
  # any moment and shouldn't block an in-flight tag; they surface on the
  # next push/PR for prompt remediation.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-audit-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        run: cargo audit

  release:
    needs: [test, clippy, fmt]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --draft --generate-notes

  build-binaries:
    needs: release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: soli-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: soli-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: soli-darwin-arm64
          # Intel Mac. `soli update` has always resolved x86_64 macOS hosts to
          # this artifact name, so without it those users get a 404.
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: soli-darwin-amd64
          # Keep the .tar.gz + .sha256 convention on Windows too: the standalone
          # builder downloads and verifies that shape, and a .zip would mean a
          # second code path plus a zip dependency for cosmetics. Windows 10
          # 1803+ ships bsdtar as tar.exe, so the packaging step is unchanged
          # apart from the binary name.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: soli-windows-amd64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # Only the cross linker/compiler is needed. OpenSSL is vendored
          # (compiled from source — see `ssh2` in Cargo.toml), so we no longer
          # install `libssl-dev:arm64` from the arm64 multiarch mirror
          # (ports.ubuntu.com), which is unreachable from some CI runners.
          # perl + make (for building vendored OpenSSL) are preinstalled.
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Package binary
        # `shell: bash` is explicit because windows-latest defaults to
        # PowerShell, where this script would not run. Windows 10 1803+ ships
        # bsdtar as tar.exe, so the tar invocation itself is unchanged.
        shell: bash
        run: |
          # Windows produces soli.exe; every other target produces soli. The
          # standalone builder looks for the matching name inside the tarball.
          BIN=soli
          if [ "${{ runner.os }}" = "Windows" ]; then BIN=soli.exe; fi
          ls -la target/${{ matrix.target }}/release/$BIN
          tar -czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release $BIN
          # SEC-041: publish a `.sha256` sibling so `soli update` can
          # verify the downloaded tarball before extracting / chmod-ing.
          # No single checksum tool spans the matrix: macOS ships `shasum` but
          # not coreutils' `sha256sum`, while the Windows runner's Git Bash
          # ships `sha256sum` but not `shasum`. Linux has both. Picking at
          # runtime keeps one step for all five targets.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.tar.gz.sha256
          fi
          cat ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload --clobber ${{ github.ref_name }} ${{ matrix.artifact }}.tar.gz
          gh release upload --clobber ${{ github.ref_name }} ${{ matrix.artifact }}.tar.gz.sha256

  publish-release:
    needs: [build-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit ${{ github.ref_name }} --draft=false

  docker:
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
