<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" role="img" aria-label="A hash-chained ledger: three linked records, an edit to record 1 breaks every hash after it, and a Merkle root commits to the whole set.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0f12"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1024" height="576" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1023" height="575" fill="none" stroke="#1c1f26" rx="0"/>

  <!-- Title -->
  <text x="56" y="72" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="34" font-weight="700" fill="#f4f4f5">Tamper-evident by construction</text>
  <text x="56" y="104" font-family="system-ui, sans-serif" font-size="17" fill="#8b929e">Each record commits to the previous one — edit any record and every hash after it breaks.</text>

  <!-- Merkle root chip (top-right) -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <rect x="748" y="40" width="220" height="70" rx="12" fill="#12151b" stroke="#3a2f14"/>
    <text x="768" y="68" font-family="system-ui, sans-serif" font-size="12" letter-spacing="1.5" fill="#f59e0b">MERKLE ROOT</text>
    <text x="768" y="92" font-size="15" fill="#e5e7eb">ce94…ee45</text>
    <text x="768" y="107" font-family="system-ui, sans-serif" font-size="10.5" fill="#6b7280">one hash proves the whole set</text>
  </g>
  <path d="M858 110 C 858 150, 512 150, 512 176" fill="none" stroke="#3a2f14" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Record cards -->
  <!-- geometry: 3 cards, width 250, y 210, height 200 -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">

    <!-- Card 0 -->
    <g>
      <rect x="40" y="210" width="250" height="210" rx="16" fill="#101319" stroke="#2b3038"/>
      <rect x="40" y="210" width="250" height="36" rx="16" fill="#151922"/>
      <rect x="40" y="230" width="250" height="16" fill="#151922"/>
      <text x="60" y="234" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#cbd5e1">Record 0 · genesis</text>
      <text x="60" y="284" font-size="13.5" fill="#9aa4b2">seq  <tspan fill="#e5e7eb">0</tspan></text>
      <text x="60" y="312" font-size="13.5" fill="#9aa4b2">prev <tspan fill="#4b5563">0000…</tspan></text>
      <text x="60" y="352" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">amount 100 → alice</text>
      <text x="60" y="392" font-size="13.5" fill="#9aa4b2">hash <tspan fill="#f59e0b">88…1</tspan></text>
    </g>

    <!-- Card 1 (tampered) -->
    <g>
      <rect x="387" y="210" width="250" height="210" rx="16" fill="#1a1113" stroke="#ef4444" stroke-width="1.5"/>
      <rect x="387" y="210" width="250" height="36" rx="16" fill="#241416"/>
      <rect x="387" y="230" width="250" height="16" fill="#241416"/>
      <text x="407" y="234" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fca5a5">Record 1 · edited after the fact</text>
      <text x="407" y="284" font-size="13.5" fill="#9aa4b2">seq  <tspan fill="#e5e7eb">1</tspan></text>
      <text x="407" y="312" font-size="13.5" fill="#9aa4b2">prev <tspan fill="#f59e0b">88…1</tspan></text>
      <text x="407" y="352" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444">amount 100 → <tspan font-weight="700">5000</tspan></text>
      <text x="407" y="392" font-size="13.5" fill="#9aa4b2">hash <tspan fill="#ef4444" text-decoration="line-through">a3…f</tspan> <tspan fill="#ef4444">✖ mismatch</tspan></text>
    </g>

    <!-- Card 2 -->
    <g>
      <rect x="734" y="210" width="250" height="210" rx="16" fill="#101319" stroke="#2b3038"/>
      <rect x="734" y="210" width="250" height="36" rx="16" fill="#151922"/>
      <rect x="734" y="230" width="250" height="16" fill="#151922"/>
      <text x="754" y="234" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#cbd5e1">Record 2</text>
      <text x="754" y="284" font-size="13.5" fill="#9aa4b2">seq  <tspan fill="#e5e7eb">2</tspan></text>
      <text x="754" y="312" font-size="13.5" fill="#9aa4b2">prev <tspan fill="#ef4444">a3…f</tspan></text>
      <text x="754" y="352" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">amount 250 → carol</text>
      <text x="754" y="392" font-size="13.5" fill="#9aa4b2">hash <tspan fill="#71767f">expects 88…1</tspan></text>
    </g>
  </g>

  <!-- Links -->
  <!-- 0 -> 1 (intact, amber): from card0 hash to card1 prev -->
  <path d="M296 386 C 330 386, 350 306, 381 306" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 1 -> 2 (broken, red dashed): from card1 hash to card2 prev -->
  <path d="M643 386 C 678 386, 700 306, 728 306" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowRed)"/>

  <!-- Broken-link badge on the 1->2 arc -->
  <g transform="translate(686 340)">
    <rect x="-58" y="-15" width="116" height="30" rx="15" fill="#1a1113" stroke="#7f1d1d"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f87171">chain breaks here</text>
  </g>

  <!-- Footer verify line -->
  <g font-family="ui-monospace, monospace" font-size="14.5">
    <rect x="40" y="470" width="944" height="56" rx="12" fill="#0c0f13" stroke="#1f242c"/>
    <text x="62" y="504" fill="#6b7280">verify(ledger)  →  </text>
    <text x="250" y="504" fill="#f87171">{ ok: false, broken_at: 1 }</text>
    <text x="560" y="504" font-family="system-ui, sans-serif" fill="#8b929e">the edit is caught, and pinned to the exact record.</text>
  </g>
</svg>
