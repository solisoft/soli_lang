<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" role="img" aria-label="Two side-by-side test runs against the same page. An HTTP spec sees only the server's HTML, so an element built by JavaScript is missing and the assertion fails. A browser spec runs the page in a real headless Chrome, the element appears, and the assertion passes. Below, the soli binary speaks the DevTools protocol directly to Chrome with no Node or npm packages in between.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0f12"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1024" height="576" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1023" height="575" fill="none" stroke="#1c1f26"/>

  <!-- Title -->
  <text x="48" y="66" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="34" font-weight="700" fill="#f4f4f5">The half of your app HTTP tests can't see</text>
  <text x="48" y="97" font-family="system-ui, sans-serif" font-size="16.5" fill="#8b929e">Same route, same assertion — one spec never runs the page's JavaScript.</text>

  <!-- ============ LEFT: HTTP spec ============ -->
  <g>
    <rect x="40" y="128" width="452" height="300" rx="16" fill="#101319" stroke="#2b3038"/>
    <rect x="40" y="128" width="452" height="40" rx="16" fill="#151922"/>
    <rect x="40" y="152" width="452" height="16" fill="#151922"/>
    <circle cx="64" cy="148" r="5" fill="#6b7280"/>
    <text x="80" y="153" font-family="system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#cbd5e1">HTTP spec</text>
    <text x="452" y="153" text-anchor="end" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b7280">server output only</text>

    <text x="64" y="196" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13.5" fill="#9aa4b2">response = <tspan fill="#e5e7eb">get("/dynamic")</tspan></text>

    <!-- what arrived -->
    <rect x="64" y="216" width="404" height="112" rx="10" fill="#0b0d11" stroke="#232830"/>
    <text x="80" y="238" font-family="system-ui, sans-serif" font-size="10.5" letter-spacing="1.4" fill="#6b7280">WHAT ARRIVED</text>
    <text x="80" y="264" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#9aa4b2">&lt;p id="static"&gt;Rendered on the server.&lt;/p&gt;</text>
    <text x="80" y="286" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#9aa4b2">&lt;div id="mounted"&gt;&lt;/div&gt;</text>
    <text x="80" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444">↑ still empty — the &lt;script&gt; never ran</text>

    <!-- verdict -->
    <rect x="64" y="346" width="404" height="58" rx="10" fill="#160f10" stroke="#40201f"/>
    <text x="84" y="371" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#cbd5e1">assert_contains(res_body(response),</text>
    <text x="84" y="391" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#cbd5e1">  "Rendered by JavaScript")</text>
    <text x="452" y="371" text-anchor="end" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444">✗</text>
  </g>

  <!-- ============ RIGHT: Browser spec ============ -->
  <g>
    <rect x="532" y="128" width="452" height="300" rx="16" fill="#101319" stroke="#3a2f14"/>
    <rect x="532" y="128" width="452" height="40" rx="16" fill="#171308"/>
    <rect x="532" y="152" width="452" height="16" fill="#171308"/>
    <circle cx="556" cy="148" r="5" fill="url(#amber)"/>
    <text x="572" y="153" font-family="system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#f4f4f5">Browser spec</text>
    <text x="944" y="153" text-anchor="end" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1741f">real headless Chrome</text>

    <text x="556" y="196" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13.5" fill="#9aa4b2">visit(<tspan fill="#e5e7eb">"/dynamic"</tspan>)</text>

    <!-- what the user sees -->
    <rect x="556" y="216" width="404" height="112" rx="10" fill="#0b0d11" stroke="#232830"/>
    <text x="572" y="238" font-family="system-ui, sans-serif" font-size="10.5" letter-spacing="1.4" fill="#6b7280">WHAT THE USER SEES</text>
    <text x="572" y="264" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#9aa4b2">&lt;p id="static"&gt;Rendered on the server.&lt;/p&gt;</text>
    <text x="572" y="286" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#22c55e">&lt;p id="from-script"&gt;Rendered by JavaScript&lt;/p&gt;</text>
    <text x="572" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e">↑ the script ran, so the element exists</text>

    <!-- verdict -->
    <rect x="556" y="346" width="404" height="58" rx="10" fill="#0e1510" stroke="#1e3a24"/>
    <text x="576" y="371" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#cbd5e1">assert_text("Rendered by JavaScript")</text>
    <text x="576" y="391" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b7280">waits for it — no sleep, no polling loop</text>
    <text x="944" y="371" text-anchor="end" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e">✓</text>
  </g>

  <!-- ============ BOTTOM: the transport ============ -->
  <g>
    <rect x="40" y="456" width="944" height="82" rx="14" fill="#0f1216" stroke="#232830"/>

    <!-- soli binary -->
    <rect x="64" y="478" width="196" height="40" rx="10" fill="#151922" stroke="#3a2f14"/>
    <text x="162" y="497" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#f59e0b">soli test --browser</text>
    <text x="162" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#6b7280">one binary</text>

    <!-- arrow -->
    <path d="M272 498 L 408 498" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
    <text x="340" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a1741f">DevTools protocol</text>
    <text x="340" y="514" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#6b7280">websocket, spoken in Rust</text>

    <!-- chrome -->
    <rect x="424" y="478" width="180" height="40" rx="10" fill="#151922" stroke="#2b3038"/>
    <text x="514" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e5e7eb">headless Chrome</text>
    <text x="514" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#6b7280">already on the machine</text>

    <!-- what is NOT in the path -->
    <line x1="640" y1="472" x2="640" y2="522" stroke="#232830"/>
    <text x="672" y="490" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.3" fill="#6b7280">NOT IN THE PATH</text>
    <text x="672" y="512" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#4b5563"><tspan text-decoration="line-through">node_modules</tspan>  <tspan text-decoration="line-through">npm ci</tspan>  <tspan text-decoration="line-through">playwright install</tspan></text>
  </g>
</svg>
