<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Soli vs. the bloated framework stack</title>
  <desc id="desc">A glowing hexagonal Soli core sits at the center, surrounded by four tall stacks representing the layered complexity of Rails, Laravel, Django, and Next.js. Subtle beams radiate from Soli, suggesting one focused system replacing many fragmented ones.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#0f172a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="soli" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="35%"  stop-color="#6366f1"/>
      <stop offset="70%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <radialGradient id="soliInner" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="35%"  stop-color="#c4b5fd" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="layer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="layerHi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="towerShadow" x="-30%" y="-10%" width="160%" height="125%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="haloBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g filter="url(#haloBlur)" opacity="0.55">
    <circle cx="600" cy="315" r="210" fill="#6366f1"/>
  </g>

  <g fill="none" stroke="#a5b4fc" stroke-opacity="0.1">
    <ellipse cx="600" cy="315" rx="450" ry="200"/>
    <ellipse cx="600" cy="315" rx="370" ry="160"/>
    <ellipse cx="600" cy="315" rx="290" ry="120"/>
  </g>

  <g stroke-linecap="round" stroke="url(#soli)" stroke-opacity="0.18" stroke-width="2">
    <line x1="600" y1="315" x2="195" y2="155"/>
    <line x1="600" y1="315" x2="1005" y2="155"/>
    <line x1="600" y1="315" x2="195" y2="475"/>
    <line x1="600" y1="315" x2="1005" y2="475"/>
  </g>

  <g transform="translate(95, 90)" filter="url(#towerShadow)">
    <rect x="2"  y="0"   width="156" height="20" rx="4" fill="url(#layerHi)" stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-2" y="24"  width="164" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="3"  y="48"  width="154" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-1" y="72"  width="162" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="2"  y="96"  width="156" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-2" y="120" width="164" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="0"  y="144" width="160" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <text x="80" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">Rails</text>
    <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.18em">7 LAYERS</text>
  </g>

  <g transform="translate(945, 90)" filter="url(#towerShadow)">
    <rect x="0"  y="0"   width="160" height="20" rx="4" fill="url(#layerHi)" stroke="#475569" stroke-opacity="0.5"/>
    <rect x="3"  y="24"  width="154" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-2" y="48"  width="164" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="1"  y="72"  width="158" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-1" y="96"  width="162" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="2"  y="120" width="156" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="0"  y="144" width="160" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <text x="80" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">Django</text>
    <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.18em">7 LAYERS</text>
  </g>

  <g transform="translate(95, 410)" filter="url(#towerShadow)">
    <rect x="-2" y="0"   width="164" height="20" rx="4" fill="url(#layerHi)" stroke="#475569" stroke-opacity="0.5"/>
    <rect x="2"  y="24"  width="156" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="0"  y="48"  width="160" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="3"  y="72"  width="154" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-1" y="96"  width="162" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="1"  y="120" width="158" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-2" y="144" width="164" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <text x="80" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">Laravel</text>
    <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.18em">7 LAYERS</text>
  </g>

  <g transform="translate(945, 410)" filter="url(#towerShadow)">
    <rect x="2"  y="0"   width="156" height="20" rx="4" fill="url(#layerHi)" stroke="#475569" stroke-opacity="0.5"/>
    <rect x="0"  y="24"  width="160" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-2" y="48"  width="164" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="3"  y="72"  width="154" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="0"  y="96"  width="160" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="-1" y="120" width="162" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <rect x="2"  y="144" width="156" height="20" rx="4" fill="url(#layer)"   stroke="#475569" stroke-opacity="0.5"/>
    <text x="80" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">Next.js</text>
    <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.18em">7 LAYERS</text>
  </g>

  <g filter="url(#glow)">
    <polygon points="600,180 720,247 720,383 600,450 480,383 480,247" fill="url(#soli)"/>
    <polygon points="600,206 696,258 696,372 600,424 504,372 504,258" fill="#0c0a1f"/>
    <circle cx="600" cy="315" r="92" fill="url(#soliInner)"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="308" font-size="58" font-weight="800" fill="#ffffff">Soli</text>
    <text x="600" y="350" font-size="12" font-weight="600" fill="#c4b5fd" letter-spacing="0.32em">ONE COHERENT SYSTEM</text>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-weight="600">
    <g transform="translate(600, 168)">
      <rect x="-86" y="-20" width="172" height="32" rx="16" fill="#020617" stroke="#6366f1" stroke-opacity="0.65"/>
      <text x="0" y="2" text-anchor="middle" font-size="13" fill="#a5b4fc">170k+ req/sec</text>
    </g>
    <g transform="translate(412, 315)">
      <rect x="-50" y="-16" width="100" height="28" rx="14" fill="#020617" stroke="#22d3ee" stroke-opacity="0.55"/>
      <text x="0" y="3" text-anchor="middle" font-size="12" fill="#67e8f9">Rust core</text>
    </g>
    <g transform="translate(788, 315)">
      <rect x="-52" y="-16" width="104" height="28" rx="14" fill="#020617" stroke="#a855f7" stroke-opacity="0.55"/>
      <text x="0" y="3" text-anchor="middle" font-size="12" fill="#d8b4fe">small core</text>
    </g>
    <g transform="translate(600, 462)">
      <rect x="-66" y="-16" width="132" height="28" rx="14" fill="#020617" stroke="#f472b6" stroke-opacity="0.55"/>
      <text x="0" y="3" text-anchor="middle" font-size="12" fill="#fbcfe8">batteries included</text>
    </g>
  </g>

  <text x="600" y="588" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc" letter-spacing="-0.01em">
    A small language and framework, designed together.
  </text>
</svg>
