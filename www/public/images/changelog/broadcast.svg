<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 240" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Unified broadcast: one call fans a payload out to both a WebSocket channel and an SSE topic of the same name">
  <defs>
    <marker id="bcArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      .box{fill:#0e1319;stroke:#2b333c;}
      .lbl{fill:#e5e7eb;font-size:14px;font-weight:600;}
      .sub{fill:#9ca3af;font-size:11.5px;}
      .code{fill:#67e8f9;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;}
      .flow{stroke:#6b7280;stroke-width:1.6;fill:none;}
      .client{fill:#0b0f14;stroke:#2b333c;}
    </style>
  </defs>

  <text x="20" y="30" fill="#f3f4f6" font-size="15" font-weight="700">One call, both transports — <tspan class="code" font-size="14">broadcast(channel, payload)</tspan></text>

  <!-- source -->
  <rect class="box" x="20" y="86" width="210" height="70" rx="10" stroke="#fbbf24"/>
  <text class="lbl" x="36" y="112">Controller / job / model</text>
  <text class="code" x="36" y="134">broadcast("posts", data)</text>

  <!-- fan-out hub -->
  <circle cx="300" cy="121" r="8" fill="#fbbf24"/>

  <!-- WS channel -->
  <rect class="box" x="410" y="58" width="190" height="54" rx="10" stroke="#a3e635"/>
  <text class="lbl" x="426" y="82">WebSocket channel</text>
  <text class="sub" x="426" y="100">room "posts"</text>

  <!-- SSE topic -->
  <rect class="box" x="410" y="130" width="190" height="54" rx="10" stroke="#22d3ee"/>
  <text class="lbl" x="426" y="154">SSE topic</text>
  <text class="sub" x="426" y="172">subscribers of "posts"</text>

  <!-- clients -->
  <rect class="client" x="660" y="50" width="150" height="30" rx="7"/>
  <text class="sub" x="676" y="70">WS client · WS client</text>
  <rect class="client" x="660" y="88" width="150" height="30" rx="7"/>
  <text class="sub" x="676" y="108">htmx / fetch (WS)</text>
  <rect class="client" x="660" y="134" width="150" height="30" rx="7"/>
  <text class="sub" x="676" y="154">EventSource client</text>
  <rect class="client" x="660" y="172" width="150" height="30" rx="7"/>
  <text class="sub" x="676" y="192">EventSource client</text>

  <!-- flows -->
  <path class="flow" d="M230 121 H292" marker-end="url(#bcArrow)"/>
  <path class="flow" d="M308 118 C350 96 372 88 404 85" marker-end="url(#bcArrow)"/>
  <path class="flow" d="M308 124 C350 146 372 154 404 157" marker-end="url(#bcArrow)"/>
  <path class="flow" d="M600 78 C628 70 636 66 654 65" marker-end="url(#bcArrow)"/>
  <path class="flow" d="M600 90 C628 96 636 100 654 103" marker-end="url(#bcArrow)"/>
  <path class="flow" d="M600 158 C628 152 636 150 654 149" marker-end="url(#bcArrow)"/>
  <path class="flow" d="M600 168 C628 178 636 182 654 187" marker-end="url(#bcArrow)"/>

  <text x="20" y="226" fill="#6b7280" font-size="11">Hashes auto-serialize to JSON. <tspan class="code" font-size="11">Model.broadcast(payload)</tspan> is the shortcut that publishes to the model's collection channel.</text>
</svg>
