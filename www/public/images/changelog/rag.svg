<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 210" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Model.rag pipeline: embed the question, ANN-search the vector index, build context from the top rows, generate an answer, and return answer plus sources">
  <defs>
    <marker id="ragArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      .box{fill:#0e1319;stroke:#2b333c;}
      .lbl{fill:#e5e7eb;font-size:13px;font-weight:600;}
      .sub{fill:#9ca3af;font-size:11px;}
      .code{fill:#67e8f9;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;}
      .flow{stroke:#6b7280;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <text x="20" y="30" fill="#f3f4f6" font-size="15" font-weight="700">One-call RAG — <tspan class="code" font-size="14">Model.rag(question)</tspan></text>

  <!-- question -->
  <rect class="box" x="20" y="66" width="120" height="60" rx="10" stroke="#fbbf24"/>
  <text class="lbl" x="34" y="92">Question</text>
  <text class="sub" x="34" y="110">"how do I…?"</text>

  <!-- embed -->
  <rect class="box" x="176" y="66" width="120" height="60" rx="10"/>
  <text class="lbl" x="190" y="92">Embed</text>
  <text class="code" x="190" y="110">embed()</text>

  <!-- ANN -->
  <rect class="box" x="332" y="66" width="140" height="60" rx="10" stroke="#a3e635"/>
  <text class="lbl" x="346" y="92">ANN search</text>
  <text class="sub" x="346" y="110">vector_index · top-k</text>

  <!-- context -->
  <rect class="box" x="508" y="66" width="130" height="60" rx="10"/>
  <text class="lbl" x="522" y="92">Build context</text>
  <text class="sub" x="522" y="110">rows' text field</text>

  <!-- LLM -->
  <rect class="box" x="674" y="66" width="110" height="60" rx="10" stroke="#22d3ee"/>
  <text class="lbl" x="688" y="92">LLM</text>
  <text class="sub" x="688" y="110">generate</text>

  <!-- result -->
  <rect class="box" x="800" y="52" width="100" height="88" rx="10" stroke="#34d399"/>
  <text class="lbl" x="814" y="78">Return</text>
  <text class="code" x="814" y="98" font-size="11">answer</text>
  <text class="code" x="814" y="116" font-size="11">sources</text>

  <!-- flows -->
  <path class="flow" d="M140 96 H170" marker-end="url(#ragArrow)"/>
  <path class="flow" d="M296 96 H326" marker-end="url(#ragArrow)"/>
  <path class="flow" d="M472 96 H502" marker-end="url(#ragArrow)"/>
  <path class="flow" d="M638 96 H668" marker-end="url(#ragArrow)"/>
  <path class="flow" d="M784 96 H794" marker-end="url(#ragArrow)"/>

  <text x="20" y="176" fill="#6b7280" font-size="11">Grounded in your own rows — the answer cites the <tspan class="code" font-size="11">sources</tspan> it used. For a live token stream, pair retrieval with <tspan class="code" font-size="11">out.llm_stream</tspan> in an <tspan class="code" font-size="11">sse</tspan> block.</text>
</svg>
